l_english:
 #replaces research_l_english override which was complicating maintenance
 RESEARCH_REPLACE_TRANSFER:0 "\n$SAVED|H0$ day(s) of previously saved research will be transferred to the new technology."
 RESEARCH_TECH_UNUSED:1 "§GClick to research§!\nWithin 56 days, you can choose a new area to research without loss of research time."
 tech_recon4_desc:0 "Deep reconnaissance operations, mixing espionage, guerrilla operations and commando training, will aid our tactical choices and allow us to adapt our decision-making rapidly."
 air_techs_folder_desc:0 "Aircraft."
 rangers_tech_desc:0 "By specializing in woodland combat, training our light infantry in adapting to terrain and vegetation, we can use less troops to hold some front areas, or even push trough enemy lines where they least expect us to do so."
 radio_detection:0 "Radio Detection"
 modern_oil_processing_desc:1 "Our oil refineries can be further improved with new advanced oil processing methods like hydrocracking, alkylation, mercaptan oxidation and isomerization."
 advanced_rubber_processing_desc:1 "A general purpose synthetic rubber recipe with improved processes such as dodecyl mercaptan polymerization modifiers will allow us to expand synthetic rubber production."
 miniature_fighters_desc: "With smaller fighters we will be able to carry more of them into battle without sacrificing much firepower, as well as reducing the weight of the Mothership's load"
 basic_encryption:1 "Encryption - Polyalphabetic Ciphers"
 improved_decryption_desc:0 "The development of more sophisticated computers allows for new applications of cryptanalysis methods like differencing, which can be used to break advanced ciphers when combined with new hand codebreaking methods."
 carrier_battlegroups_desc:0 "Carriers are able to strike at the enemy from a greater distance than any naval cannon and with eyes in the sky we will never be caught off guard. Carriers in mass is a force to be reckoned with."
 DESPERATE_DEFENSE_LABEL:0 "FLEXIBLE STRUCTURE"
 DESPERATE_DEFENSE_LABEL_TT:0 "Subordinate are given proper guidance and are trained to act independently."
 BATTLEFIELD_SUPPORT_DESC:1 "By improving how close air support interacts with divisions we can lay waste to enemy divisions with optimal support."
 OPERATIONAL_INTEGRITY_DESC:0 "Tactical bombers are flexible and can perform both ground support and regular bombing."
 cl_tech:1 "Light Cruiser models"
 ca_tech:1 "Heavy Cruiser models"
 JET_ENGINES_RESEARCHED:0 "Allows researching technologies that require Jet Engines, such as jet aircrafts"
 degaussing_desc:0 "By installing powerful electro-magnetic coils, a ship's magnetic signature can be dramatically reduced, making it far less vulnerable to magnetic mines."
 homing_torpedo_desc:0 "Equipped with an acoustic detector, the torpedo can home in on the biggest source of noise ahead of it - usually the target."